# 理由は全然わからないが、var_filesを使うには一旦var_filesなしのホストを実行しないと謎のエラーになる
- hosts: localhost
  tasks: []

- hosts: localhost
  vars_files:
    - variables
  tasks:
    # $TARGETが指定されていればそのファイルを実行、そうでなければ全リストを実行
    - set_fact:
        default_tasks:
          - setup-apt.yaml
          - packages.yaml
          - wsl.yaml
          - dotfiles.yaml
          - mise.yaml
          - ssh.yaml
          - docker-ce.yaml
          - google-cloud-sdk.yaml
          - azure-cli.yaml
          - claude.yaml
    - set_fact:
        task_list: "{{ [lookup('env', 'TARGET') + '.yaml'] if lookup('env', 'TARGET') else default_tasks }}"

    - include_tasks:
        file: "{{ task_file }}"
      loop: "{{ task_list }}"
      loop_control:
        loop_var: task_file

  handlers:
    - name: reload sshd
      become: true
      systemd:
        name: ssh.service
        state: reloaded
        daemon_reload: yes

    - name: restart systemd-timesyncd
      become: true
      systemd:
        name: systemd-timesyncd.service
        state: restarted
        daemon_reload: yes

    - name: restart claude-sync timer
      systemd:
        name: claude-sync.timer
        state: restarted
        scope: user
        daemon_reload: true
